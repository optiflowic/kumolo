name: 🚀 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 🔍 Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 🔍 Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: 🖊️ Check formatting
        run: make fmt-check

      - name: 🔎 Vet
        run: make vet

      - name: 🧪 Test
        run: make test

      - name: 🏗️ Build
        run: make build

      - name: 🧼 Clean build artifacts
        run: make clean
