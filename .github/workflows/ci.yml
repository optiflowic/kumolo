name: 🚀 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🔧 Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 🔍 Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  security:
    name: Security
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🔧 Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 🔐 Verify module checksums
        run: make verify

      - name: 🛡️ Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🔧 Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 🔍 Check go mod tidy
        run: |
          make tidy
          git diff --exit-code go.mod go.sum

      - name: 🖊️ Check formatting
        run: make fmt-check

      - name: 🔎 Vet
        run: make vet

      - name: 🧪 Test with coverage
        run: |
          make cover
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}')
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV

      - name: 💬 Post coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            const funcOutput = execSync('go tool cover -func=coverage.out').toString().trim();
            const lines = funcOutput.split('\n');

            // Extract total from last line
            const totalMatch = lines.at(-1).match(/([\d.]+)%/);
            const total = totalMatch ? parseFloat(totalMatch[1]) : 0;
            const pct = `${total.toFixed(1)}%`;
            const totalIcon = total >= 90 ? '🟢' : total >= 70 ? '🟡' : '🔴';

            // Aggregate coverage per package
            const pkgMap = new Map();
            for (const line of lines.slice(0, -1)) {
              const m = line.match(/^(.+):\d+:\t.+\t([\d.]+)%/);
              if (!m) continue;
              const pkg = m[1].substring(0, m[1].lastIndexOf('/'));
              const cov = parseFloat(m[2]);
              if (!pkgMap.has(pkg)) pkgMap.set(pkg, { sum: 0, n: 0 });
              const e = pkgMap.get(pkg);
              e.sum += cov;
              e.n++;
            }

            // Build table sorted by package name
            const rows = [...pkgMap.entries()]
              .sort(([a], [b]) => a.localeCompare(b))
              .map(([pkg, { sum, n }]) => {
                const avg = (sum / n).toFixed(1);
                const icon = parseFloat(avg) >= 90 ? '🟢' : parseFloat(avg) >= 70 ? '🟡' : '🔴';
                return `| \`${pkg}\` | ${icon} ${avg}% |`;
              })
              .join('\n');

            const body = [
              `## 📊 Coverage: ${totalIcon} ${pct}`,
              '',
              '| Package | Coverage |',
              '|---|---|',
              rows,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## 📊 Coverage'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: 🏗️ Build
        run: make build

      - name: 🧼 Clean build artifacts
        run: make clean

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
