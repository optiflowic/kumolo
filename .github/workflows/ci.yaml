name: 🚀 CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ❄️ Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: 📦 Cache Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: 604800

      - name: 🗂️ Cache Go modules
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: 🔍 Run golangci-lint
        run: nix develop .#core --command make lint

  security:
    name: Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ❄️ Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: 📦 Cache Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: 604800

      - name: 🗂️ Cache Go modules
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: 🔐 Verify module checksums
        run: nix develop .#core --command make verify

      - name: 🛡️ Run govulncheck
        run: nix develop .#core --command govulncheck ./...

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ❄️ Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: 📦 Cache Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: 604800

      - name: 🗂️ Cache Go modules
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: 🔍 Check go mod tidy
        run: |
          nix develop .#core --command make tidy
          git diff --exit-code go.mod go.sum

      - name: 🖊️ Check formatting
        run: nix develop .#core --command make fmt-check

      - name: 🔎 Vet
        run: nix develop .#core --command make vet

      - name: 🧪 Test with coverage
        run: |
          nix develop .#core --command bash -c 'make cover && go tool cover -func=coverage.out > coverage-func.out'
          COVERAGE=$(tail -1 coverage-func.out | awk '{print $3}')
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV

      - name: 💬 Post coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require('fs');

            const funcOutput = fs.readFileSync('coverage-func.out', 'utf8').trim();
            const lines = funcOutput.split('\n');

            // Extract total from last line
            const totalMatch = lines.at(-1).match(/([\d.]+)%/);
            const total = totalMatch ? parseFloat(totalMatch[1]) : 0;
            const pct = `${total.toFixed(1)}%`;
            const totalIcon = total >= 90 ? '🟢' : total >= 70 ? '🟡' : '🔴';

            // Aggregate coverage per package
            const pkgMap = new Map();
            for (const line of lines.slice(0, -1)) {
              const m = line.match(/^(.+):\d+:\t.+\t([\d.]+)%/);
              if (!m) continue;
              const pkg = m[1].substring(0, m[1].lastIndexOf('/'));
              const cov = parseFloat(m[2]);
              if (!pkgMap.has(pkg)) pkgMap.set(pkg, { sum: 0, n: 0 });
              const e = pkgMap.get(pkg);
              e.sum += cov;
              e.n++;
            }

            // Build table sorted by package name
            const rows = [...pkgMap.entries()]
              .sort(([a], [b]) => a.localeCompare(b))
              .map(([pkg, { sum, n }]) => {
                const avg = (sum / n).toFixed(1);
                const icon = parseFloat(avg) >= 90 ? '🟢' : parseFloat(avg) >= 70 ? '🟡' : '🔴';
                return `| \`${pkg}\` | ${icon} ${avg}% |`;
              })
              .join('\n');

            const body = [
              `## 📊 Coverage: ${totalIcon} ${pct}`,
              '',
              '| Package | Coverage |',
              '|---|---|',
              rows,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## 📊 Coverage'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: 🏗️ Build
        run: nix develop .#core --command make build

      - name: 🔗 Integration tests
        run: nix develop .#core --command make integration

      - name: 🧼 Clean build artifacts
        run: nix develop .#core --command make clean

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: 🐳 Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: false
          build-args: |
            VERSION=dev
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
