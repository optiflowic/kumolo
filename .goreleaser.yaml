version: 2

project_name: kumolo

before:
  hooks:
    - go mod tidy

builds:
  - id: kumolo
    main: ./cmd/kumolo
    binary: kumolo
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^chore(deps):"
      - "^Merge pull request"

release:
  github:
    owner: optiflowic
    name: kumolo
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto
