version: "2"

linters:
  enable:
    - gosec
  exclusions:
    rules:
      # Test files intentionally set restrictive permissions to trigger error paths.
      - path: _test\.go
        linters:
          - gosec
        text: "G302"
      # AWS API parameter names (ExpressionAttributeNames, ExpressionAttributeValues) must
      # appear capitalized in error messages to match real AWS error responses.
      - path: internal/dynamodb/expression\.go
        linters:
          - staticcheck
        text: "ST1005"

formatters:
  enable:
    - golines
  settings:
    golines:
      max-len: 100
